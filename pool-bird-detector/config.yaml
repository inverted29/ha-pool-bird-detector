name: Pool Bird Detector
version: "1.0.0"
slug: pool_bird_detector
description: Watches /media/pool_motion/ for new .mp4 clips, extracts a frame, runs TFLite MobileNet COCO classification, and publishes bird/duck detection results to MQTT.
url: https://github.com/arendowden/ha-pool-bird-detector
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
map:
  - media:rw
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic: pool_motion/classification
  watch_dir: /media/pool_motion
  confidence_threshold: 0.30
  frame_offset_seconds: 3
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  mqtt_topic: str
  watch_dir: str
  confidence_threshold: float
  frame_offset_seconds: int
